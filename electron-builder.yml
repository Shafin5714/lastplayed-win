appId: com.lastplayed.app
productName: LastPlayed
directories:
  output: dist
win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
files:
  - main.js
  - preload.js
  - importer.js
  - series-detector.js
  - renderer/**
  - assets/**
  - node_modules/**
  - package.json
