appId: com.lastplayed.app
productName: LastPlayed
directories:
  output: dist
artifactName: ${name}-Setup-${version}.${ext}
win:
  target: nsis
  icon: assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
files:
  - main.js
  - preload.js
  - importer.js
  - series-detector.js
  - renderer/**
  - assets/**
  - node_modules/**
  - package.json
